x-logging: &default-logging
  # Cap container stdout logs so a chatty service can't fill the VPS
  # disk. 50MB × 5 files = 250MB per container max. Spring Boot
  # INFO + ~30s DART polling fits in a single 50MB rotation for
  # several days at typical volume; the operator runbook has the
  # `du -sh /var/lib/docker/containers/.../-json.log` check anyway.
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    # Pin a concrete patch version (not just `16-alpine`) so a
    # `docker compose pull` doesn't silently take a different
    # patch release. Bump deliberately after reading the upstream
    # changelog.
    image: postgres:16.8-alpine
    container_name: dartintel-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: dartintel
      POSTGRES_USER: dartintel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    # Bind to localhost only — Spring app reaches Postgres through the
    # docker compose network (`postgres:5432`). Exposing 5432 on the
    # public interface gives attackers direct DB access; binding to
    # 127.0.0.1 keeps `psql` available over SSH but blocks the open
    # internet.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dartintel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    # Same rationale as postgres — pin a concrete patch version.
    image: redis:7.4-alpine
    container_name: dartintel-redis
    restart: unless-stopped
    logging: *default-logging
    # Bind to localhost only — Spring app reaches Redis through the
    # docker compose network (`redis:6379`). An open Redis with no
    # password (the default config) lets any attacker read/write/delete
    # the cache + payment-replay keys + the summary job queue, which
    # would let them inflate Gemini bills via injected work. Localhost
    # binding closes the public port while keeping `redis-cli`
    # accessible over SSH for debugging.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    environment:
      # Inside the container so the healthcheck below can read it via
      # $REDIS_PASSWORD. The compose-file `--requirepass` arg is
      # already substituted at parse time so the container starts with
      # auth enabled even when the env var is missing — but the
      # healthcheck would silently fail without this block.
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    # `requirepass` blocks any other container on the same docker
    # network from reading/writing payment-replay keys or the summary
    # job queue. The password is supplied via REDIS_PASSWORD; the app
    # service reads the same env var as SPRING_DATA_REDIS_PASSWORD.
    command: ["redis-server", "--appendonly", "yes",
              "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────── prod profile — activate with ──────────────────
  #   docker compose --profile prod up -d
  # ──────────────────────────────────────────────────────────────────
  app:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dartintel-app
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dartintel
      SPRING_DATASOURCE_USERNAME: dartintel
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      DART_API_KEY: ${DART_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL}
      X402_NETWORK: ${X402_NETWORK}
      X402_RECIPIENT_ADDRESS: ${X402_RECIPIENT_ADDRESS}
      X402_ASSET: ${X402_ASSET}
      X402_CDP_KEY_ID: ${X402_CDP_KEY_ID:-}
      X402_CDP_PRIVATE_KEY: ${X402_CDP_PRIVATE_KEY:-}
      X402_TOKEN_NAME: ${X402_TOKEN_NAME:-USDC}
      X402_TOKEN_VERSION: ${X402_TOKEN_VERSION:-2}
      SUMMARY_BACKFILL_ENABLED: ${SUMMARY_BACKFILL_ENABLED:-false}
    # Bind to localhost only — public traffic reaches the app via the
    # cloudflared sidecar through the docker compose network
    # (`app:8080`), so the host port doesn't need to be open to the
    # internet. Localhost binding prevents anyone from bypassing
    # Cloudflare's edge by hitting the VM IP directly.
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  cloudflared:
    profiles: ["prod"]
    # `latest` was being silently re-resolved on every `docker compose
    # pull`. Pin to a known release; bump after reviewing the
    # cloudflared release notes. Production tunnel token routes all
    # inbound traffic, so a backdoored upstream image would be high
    # impact.
    image: cloudflare/cloudflared:2026.3.0
    container_name: dartintel-tunnel
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - app
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  postgres_data:
  redis_data:
