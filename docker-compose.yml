services:
  postgres:
    image: postgres:16-alpine
    container_name: dartintel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dartintel
      POSTGRES_USER: dartintel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dartintel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dartintel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

