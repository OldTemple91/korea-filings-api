<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Korea Filings — option E">
  <!--
    Option E — "Candlestick K".
    A capital "K" silhouette built entirely from Korean stock-chart
    candlesticks. Vertical stroke = the body of the K, formed from
    three stacked OHLC bars. The two diagonal strokes are sequences
    of ascending candles that meet at the K's centre, suggesting an
    upward trend reading as the letter K from afar. Korean idiom:
    red = price up (opposite of US convention), so this mark uses
    the Korean red as its primary "growth" signal — instantly
    legible to Korean capital-market readers, intriguing to non-
    Koreans who notice the colour inversion.
  -->
  <rect width="256" height="256" rx="56" fill="#0a0a0a"/>

  <!-- K body — 3 stacked candlesticks (vertical) -->
  <g fill="#E03131" stroke="#E03131" stroke-width="2">
    <rect x="64" y="60" width="22" height="32" rx="3"/>
    <rect x="64" y="100" width="22" height="56" rx="3"/>
    <rect x="64" y="164" width="22" height="36" rx="3"/>
  </g>
  <!-- thin wicks above / between -->
  <g stroke="#E03131" stroke-width="3" stroke-linecap="round">
    <line x1="75" y1="48" x2="75" y2="60"/>
    <line x1="75" y1="92" x2="75" y2="100"/>
    <line x1="75" y1="156" x2="75" y2="164"/>
    <line x1="75" y1="200" x2="75" y2="212"/>
  </g>

  <!-- K upper diagonal — ascending candles -->
  <g fill="#E03131">
    <rect x="100" y="100" width="18" height="28" rx="3" transform="rotate(-30 109 114)"/>
    <rect x="130" y="78"  width="18" height="28" rx="3" transform="rotate(-30 139 92)"/>
    <rect x="160" y="56"  width="18" height="28" rx="3" transform="rotate(-30 169 70)"/>
  </g>

  <!-- K lower diagonal — descending candles (still red = Korean "up") -->
  <g fill="#E03131">
    <rect x="100" y="128" width="18" height="28" rx="3" transform="rotate(30 109 142)"/>
    <rect x="130" y="150" width="18" height="28" rx="3" transform="rotate(30 139 164)"/>
    <rect x="160" y="172" width="18" height="28" rx="3" transform="rotate(30 169 186)"/>
  </g>
</svg>
