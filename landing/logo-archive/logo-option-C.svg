<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Korea Filings — option C">
  <!--
    Option C — "Geometric portal" mark, Polygon.io-style.
    Abstract geometric reading: a tilted square frame (the "portal"
    through which Korean filings flow into English) with a bold "K"
    centred inside. Negative space between the frame and the K hints
    at a structured envelope / API response. The frame is rotated 12°
    so it reads as motion / dynamism rather than static institutional
    badge. Same blue family as Base mainnet ecosystem affiliation.
  -->
  <rect width="256" height="256" rx="56" fill="#0a0a0a"/>

  <!-- Tilted square frame (portal / data envelope) -->
  <g transform="rotate(12 128 128)">
    <rect x="56" y="56" width="144" height="144" rx="14"
          fill="none" stroke="#0052FF" stroke-width="14"/>
  </g>

  <!-- Central K (upright, not rotated) -->
  <g fill="#ffffff">
    <rect x="92" y="84" width="22" height="88" rx="4"/>
    <polygon points="114,128 152,84 174,84 132,128"/>
    <polygon points="114,128 152,172 174,172 132,128"/>
  </g>
</svg>
