server:
  # Cloudflare Tunnel terminates TLS upstream and forwards us plain HTTP
  # with X-Forwarded-Proto: https. Without this, every URL Spring builds
  # (resource.url in the 402 body, /actuator/info self-link) reports the
  # internal http:// scheme — confusing for clients and x402 indexers
  # that probe the resource.
  forward-headers-strategy: framework
  tomcat:
    # Trust X-Forwarded-* only from internal Docker bridge networks
    # where the cloudflared sidecar runs. The default Docker bridge is
    # 172.17.0.0/16, compose-managed bridges typically 172.18-22.0.0/16.
    # We also include 127.0.0.0/8 in case the container is run in
    # `network_mode: host` for testing. An attacker outside these
    # ranges sending forged X-Forwarded-Host cannot influence
    # `buildResourceUrl`, so the 402 challenge URL stays trustworthy.
    remoteip:
      internal-proxies: "127\\.0\\.0\\.1|172\\.(1[6-9]|2[0-9]|3[0-1])\\.\\d+\\.\\d+|10\\.\\d+\\.\\d+\\.\\d+"

spring:
  application:
    name: korea-filings-api
  datasource:
    url: jdbc:postgresql://localhost:5432/dartintel
    username: dartintel
    password: ${POSTGRES_PASSWORD:changeme_in_env}
    hikari:
      # Sized for: concurrent paid HTTP requests + DartPollingScheduler
      # (every 30s) + SummaryJobConsumer (one connection, blocks on LLM)
      # + SummaryRetryScheduler + CompanySyncScheduler (long-running).
      # Default 10 is tight; bump to 20 with a generous timeout. If the
      # pool ever empties, log and surface the failure rather than hang.
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      max-lifetime: 1800000
      idle-timeout: 600000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

# springdoc serves the OpenAPI JSON at /openapi.json (the standard
# location every indexer / discovery CLI probes first), and the
# Swagger UI is mounted under /swagger-ui. The legacy /v3/api-docs
# path is kept as a 301 redirect (LegacyApiDocsController) so any
# external doc that pinned the old URL keeps working.
springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    path: /swagger-ui/index.html

management:
  endpoints:
    web:
      exposure:
        # `prometheus` exposes Micrometer's full meter registry so an
        # external Prometheus / Grafana scraper can pull JVM, Hikari,
        # Lettuce, Tomcat, Resilience4j (circuit breakers / retries /
        # rate limiters), and our custom counters (settle success /
        # failure / replay rejections) without writing extra code —
        # the dependency was already on the classpath via
        # micrometer-registry-prometheus, just needed activation.
        include: health, info, ratelimiters, circuitbreakers, retries, prometheus, metrics
  endpoint:
    health:
      show-details: when_authorized
      # Separate liveness (is the JVM up?) from readiness (are all
      # downstreams — Postgres, Redis, Flyway — wired through?).
      # Cloudflare Tunnel / Docker healthcheck hit /actuator/health/liveness.
      probes:
        enabled: true
  info:
    build:
      enabled: true
    git:
      enabled: true
      # Public actuator/info — full mode would surface every commit's
      # author/email/branch graph to anyone who pings the endpoint.
      # `simple` exposes just the current commit id and time.
      mode: simple

dart:
  api:
    base-url: https://opendart.fss.or.kr/api
    key: ${DART_API_KEY:}
    timeout:
      connect-ms: 5000
      read-ms: 10000
  polling:
    enabled: true
    interval-ms: 30000
    initial-cursor-days-back: 1
    page-count: 100

gemini:
  base-url: https://generativelanguage.googleapis.com
  key: ${GEMINI_API_KEY:}
  timeout:
    connect-ms: 5000
    read-ms: 30000

x402:
  # Coinbase's hosted v2 facilitator. Swap to https://x402.org/facilitator if
  # moving off Coinbase, or point at a self-hosted facilitator.
  facilitator-url: ${X402_FACILITATOR_URL:https://api.cdp.coinbase.com/platform/v2/x402}
  # EIP-155 chain id. base mainnet = eip155:8453; base sepolia = eip155:84532.
  network: ${X402_NETWORK:eip155:84532}
  recipient-address: ${X402_RECIPIENT_ADDRESS:0x0000000000000000000000000000000000000000}
  # USDC contract. Base Sepolia: 0x036CbD53842c5426634e7929541eC2318f3dCF7e.
  # Base mainnet: 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913.
  asset: ${X402_ASSET:0x036CbD53842c5426634e7929541eC2318f3dCF7e}
  # EIP-712 domain — must match the on-chain contract's name() and version()
  # exactly or the facilitator's `transferWithAuthorization` simulation reverts
  # with `invalid_payload`. Sepolia USDC: "USDC"/"2"; mainnet USDC: "USD Coin"/"2".
  token-name: ${X402_TOKEN_NAME:USDC}
  token-version: ${X402_TOKEN_VERSION:2}
  # Window during which the EIP-3009 authorisation is valid. The
  # x402 v2 spec example uses 60 s; reference servers and the
  # Coinbase facilitator default to the same. 60 s is plenty for an
  # honest agent (sign + retry round-trip is < 1 s) and a tighter
  # window reduces the chance a stolen signature can still be
  # replayed before its on-chain validBefore expires.
  max-timeout-seconds: 60
  timeout:
    connect-ms: 5000
    read-ms: 10000
  replay:
    # payment_sig:{hash} TTL per ARCHITECTURE.md spec.
    ttl-seconds: 3600
  cdp:
    # Required only for the Coinbase CDP mainnet facilitator. Both fields
    # left blank for testnet — the public x402.org facilitator is
    # unauthenticated. Populate via env vars when switching to mainnet.
    key-id: ${X402_CDP_KEY_ID:}
    private-key: ${X402_CDP_PRIVATE_KEY:}

resilience4j:
  circuitbreaker:
    instances:
      dart:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      gemini:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
      facilitator:
        sliding-window-size: 10
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      dart:
        max-attempts: 2
        wait-duration: 1s
      gemini:
        max-attempts: 2
        wait-duration: 2s
        # A rate-limit miss or an open breaker should NOT burn retries —
        # the retry scheduler re-enqueues those rcpt_nos on a different pass.
        ignore-exceptions:
          - io.github.resilience4j.ratelimiter.RequestNotPermitted
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
      facilitator:
        max-attempts: 2
        wait-duration: 500ms
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  ratelimiter:
    instances:
      gemini:
        # Gemini 2.5 Flash-Lite free tier: 15 RPM, but Google's sliding
        # window aggregates across sessions/keys, so we set a conservative
        # 10 to leave headroom for manual tests and live ITs.
        # Paid tier 1 operators can raise to 4000 via config override.
        limit-for-period: 10
        limit-refresh-period: 60s
        # Background consumer has no user waiting; block up to the full
        # refresh window for a permit rather than failing fast.
        timeout-duration: 60s

audit:
  requests:
    # When true, registers RequestAuditFilter, which logs one
    # `REQ_AUDIT` line per non-GET request OR any 4xx/5xx response.
    # Captures method, path, status, IP (CF-Connecting-IP), UA,
    # query parameter KEY names (no values), body size,
    # content-type, and presence (boolean) of X-PAYMENT /
    # PAYMENT-SIGNATURE headers — never their values, since those
    # carry signed nonces. Used to quantify how often agents call
    # paid GET endpoints with the wrong verb and whether they
    # attach a payment payload, which informs whether to open
    # parallel POST handlers. Off by default; enable in prod via
    # REQUEST_AUDIT_ENABLED=true in .env.
    enabled: ${REQUEST_AUDIT_ENABLED:false}
    # When true (and `enabled` is also true), the same audit rows
    # are also written to the `request_audit` Postgres table via an
    # async, bounded-queue persister. The DB-resident copy survives
    # log rotation (50 MB × 5 generations) and powers the funnel /
    # KPI / cohort queries documented in docs/ANALYTICS.md. 90-day
    # retention via a nightly prune at 04:00 UTC. Off by default;
    # enable in prod via REQUEST_AUDIT_PERSIST=true in .env.
    # `enabled` must be true for `persist` to have any effect — the
    # persister is downstream of the filter.
    persist: ${REQUEST_AUDIT_PERSIST:false}

logging:
  level:
    # com.dartintel at INFO for production. DEBUG triggers per-request
    # log lines that include the resource URL + a partial signature
    # hash on every paid call — useful in dev, log-volume-heavy in
    # prod. Override to DEBUG via SPRING_PROFILES_ACTIVE=local +
    # application-local.yml for deeper tracing without redeploying.
    com.dartintel: INFO
    org.flywaydb: INFO
    # Hibernate SQL stays at WARN for production: the DEBUG setting
    # logged every JPA query (incl. per-request payment_log INSERTs
    # with payer wallet + signature_hash inline) on every call. WARN
    # surfaces real query-level errors without the per-request noise.
    org.hibernate.SQL: WARN
