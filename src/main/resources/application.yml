spring:
  application:
    name: korea-filings-api
  datasource:
    url: jdbc:postgresql://localhost:5432/dartintel
    username: dartintel
    password: ${POSTGRES_PASSWORD:changeme_in_env}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized

dart:
  api:
    base-url: https://opendart.fss.or.kr/api
    key: ${DART_API_KEY:}
    timeout:
      connect-ms: 5000
      read-ms: 10000
  polling:
    enabled: true
    interval-ms: 30000
    initial-cursor-days-back: 1
    page-count: 100

gemini:
  base-url: https://generativelanguage.googleapis.com
  key: ${GEMINI_API_KEY:}
  timeout:
    connect-ms: 5000
    read-ms: 30000

resilience4j:
  circuitbreaker:
    instances:
      dart:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      gemini:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      dart:
        max-attempts: 2
        wait-duration: 1s
      gemini:
        max-attempts: 2
        wait-duration: 2s

logging:
  level:
    com.dartintel: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG
